name: Publish versioned dataset release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Dataset version (for example v2.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            .hf-cache
            .cache
          key: hugin-minilm-q8-${{ hashFiles('data/source/public-graph.json', 'package-lock.json') }}
      - run: npm ci
      - name: Build and validate dataset
        env:
          HUGIN_SIMILARITY_ENGINE: transformers
          HUGIN_MODEL_CACHE: .hf-cache
        run: npm run data:build
      - run: npm run data:validate
      - run: npm run data:export
      - name: Create immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ inputs.version }}" release/* --verify-tag=false --generate-notes --title "HUGIN Dataset ${{ inputs.version }}"
