name: Deploy HUGIN to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - hugin/**
      - scripts/build_hugin.py
      - scripts/process_raven_assets.py
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate committed HUGIN build
        run: python3 scripts/build_hugin.py --check

      - name: Test embedded graph and interface contract
        run: python3 scripts/test_hugin.py --source-template

      - name: Stage self-contained site
        run: python3 scripts/build_hugin.py --dist .pages

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .pages
          include-hidden-files: true

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
