name: HUGIN 2.1 quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  data:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
      - name: Cache pinned ONNX model and corpus embeddings
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            .hf-cache
            .cache
          key: hugin-minilm-q8-${{ hashFiles('data/source/public-graph.json', 'scripts/build-data.mjs', 'package-lock.json') }}
      - run: npm ci
      - name: Build semantic dataset in the cloud
        env:
          HUGIN_SIMILARITY_ENGINE: transformers
          HUGIN_MODEL_CACHE: .hf-cache
        run: npm run data:build
      - run: npm run data:validate
      - name: Hand generated data to the site job
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: hugin-generated-${{ github.sha }}
          path: |
            src/generated
            public/data
          retention-days: 1

  build-test:
    needs: data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: hugin-generated-${{ github.sha }}
          path: .
      - name: Build Astro and Pagefind from verified data
        run: npm run site:build
      - run: npm run site:validate
      - run: npm run check
      - run: npm run test:budgets
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npx lhci autorun
      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: hugin-2-review-${{ github.sha }}
          path: |
            dist
            playwright-report
          retention-days: 7
